name: Olmsted Parcels Loader
# Manual + monthly. The Olmsted assessor layer refreshes on assessment
# cadence (TaxYear 2027 rows already published) — monthly keeps the spine
# and owners fresh without hammering the county server. The Rochester/Mayo
# pilot's foundation job.
on:
  workflow_dispatch:
  schedule:
    # 2nd of the month, 13:30 UTC = 7:30am Central (standard) / 8:30am (DST).
    # Offset from the Ramsey monthly job (1st, 13:30 UTC) and the daily
    # sheriff jobs (12:00-12:20 UTC) so nothing overlaps.
    - cron: '30 13 2 * *'
jobs:
  scrape:
    name: Run Olmsted parcels (spine + owners)
    runs-on: ubuntu-latest
    # ~76 keyset pages of 1000 + per-page DB writes; generous headroom.
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Olmsted parcels loader
        env:
          # --- Required: database ---
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # --- Required: app config (mirror Railway's values) ---
          ENVIRONMENT: production
          LOG_LEVEL: INFO
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          # --- Geocoding (parcel_resolver may call these) ---
          GEOCODING_ENABLED: 'true'
          GEOCODING_CACHE_DAYS: '30'
          NOMINATIM_USER_AGENT: ${{ secrets.NOMINATIM_USER_AGENT }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
          # --- Scheduler (only used by Railway, but config may require it) ---
          SCHEDULER_TIMEZONE: America/Chicago
          # --- Feature flags: enable ONLY this job ---
          SCRAPER_ANOKA_SHERIFF_ENABLED: 'false'
          SCRAPER_DAKOTA_SHERIFF_ENABLED: 'false'
          SCRAPER_HENNEPIN_SHERIFF_ENABLED: 'false'
          SCRAPER_HENNEPIN_PARCELS_ENABLED: 'false'
          SCRAPER_HENNEPIN_TAX_ROLL_ENABLED: 'false'
          SCRAPER_MCRO_PROBATE_ENABLED: 'false'
          SCRAPER_MPLS_311_ENABLED: 'false'
          SCRAPER_MPLS_VBR_ENABLED: 'false'
          SCRAPER_OLMSTED_PARCELS_ENABLED: 'true'
          SCRAPER_RAMSEY_SHERIFF_ENABLED: 'false'
          SCRAPER_RAMSEY_PARCELS_ENABLED: 'false'
          SCRAPER_RAMSEY_TAX_ROLL_ENABLED: 'false'
          SCRAPER_RAMSEY_TFL_ENABLED: 'false'
          SCRAPER_SAINT_PAUL_VACANT_ENABLED: 'false'
          SCRAPER_TAX_FORFEIT_ENABLED: 'false'
          SCRAPER_USPS_VACANCY_ENABLED: 'false'
        run: |
          python -m scripts.run_olmsted_parcels github_actions
