name: Hennepin Tax-Roll Miner

# Manual + monthly. This is a DB mining job (reads core.parcels), and tax
# forfeiture changes on a slow, multi-year cycle, so daily would be wasteful.
# Runs on the 1st of each month. Manual trigger always available.
on:
  workflow_dispatch:
  schedule:
    # 13:00 UTC on the 1st = 7am Central (standard) / 8am Central (DST).
    # Staggered well clear of the daily sheriff jobs (12:00–12:20).
    - cron: '0 13 1 * *'

jobs:
  scrape:
    name: Run Hennepin tax-roll miner
    runs-on: ubuntu-latest
    # Pure DB read+write, no HTTP scraping, small result set (~4K parcels).
    # Fast — but allow headroom for the core.parcels paging.
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Hennepin tax-roll miner
        env:
          # --- Required: database ---
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # --- Required: app config (mirror Railway's values) ---
          ENVIRONMENT: production
          LOG_LEVEL: INFO
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}

          # --- Geocoding (parcel_resolver may call these; harmless here) ---
          GEOCODING_ENABLED: 'true'
          GEOCODING_CACHE_DAYS: '30'
          NOMINATIM_USER_AGENT: ${{ secrets.NOMINATIM_USER_AGENT }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}

          # --- Scheduler (only used by Railway, but config may require it) ---
          SCHEDULER_TIMEZONE: America/Chicago

          # --- Feature flags: enable only the tax-roll miner ---
          SCRAPER_ANOKA_SHERIFF_ENABLED: 'false'
          SCRAPER_DAKOTA_SHERIFF_ENABLED: 'false'
          SCRAPER_HENNEPIN_SHERIFF_ENABLED: 'false'
          SCRAPER_HENNEPIN_TAX_ROLL_ENABLED: 'true'
          SCRAPER_MCRO_PROBATE_ENABLED: 'false'
          SCRAPER_MPLS_311_ENABLED: 'false'
          SCRAPER_MPLS_VBR_ENABLED: 'false'
          SCRAPER_RAMSEY_SHERIFF_ENABLED: 'false'
          SCRAPER_SAINT_PAUL_VACANT_ENABLED: 'false'
          SCRAPER_TAX_FORFEIT_ENABLED: 'false'
          SCRAPER_USPS_VACANCY_ENABLED: 'false'

        run: |
          python -m scripts.run_hennepin_tax_roll github_actions
