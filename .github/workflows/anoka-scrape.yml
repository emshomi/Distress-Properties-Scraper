name: Anoka Sheriff Scraper

# Manual + daily. The schedule fires once a day; manual trigger is always
# available via the GitHub Actions UI.
on:
  workflow_dispatch:
  schedule:
    # 12:00 UTC = 6am Central (standard) / 7am Central (DST). Daily.
    - cron: '0 12 * * *'

jobs:
  scrape:
    name: Run Anoka scraper
    runs-on: ubuntu-latest
    # Detail enrichment uses headless Chromium, which adds ~1-2 min over
    # the pure-httpx version. Keep timeout generous.
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        # Pulls in the Chromium browser binary + the few system libs it
        # needs on Ubuntu. Required because the Anoka detail page enforces
        # session protection that only a real browser passes.
        run: |
          python -m playwright install --with-deps chromium

      - name: Run Anoka scraper
        env:
          # --- Required: database ---
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # --- Required: app config (mirror Railway's values) ---
          ENVIRONMENT: production
          LOG_LEVEL: INFO
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}

          # --- Geocoding (parcel_resolver may call these) ---
          GEOCODING_ENABLED: 'true'
          GEOCODING_CACHE_DAYS: '30'
          NOMINATIM_USER_AGENT: ${{ secrets.NOMINATIM_USER_AGENT }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}

          # --- Scheduler (only used by Railway, but config may require it) ---
          SCHEDULER_TIMEZONE: America/Chicago

          # --- Feature flags: enable only Anoka, leave the rest off ---
          SCRAPER_ANOKA_SHERIFF_ENABLED: 'true'
          SCRAPER_DAKOTA_SHERIFF_ENABLED: 'false'
          SCRAPER_HENNEPIN_SHERIFF_ENABLED: 'false'
          SCRAPER_MCRO_PROBATE_ENABLED: 'false'
          SCRAPER_MPLS_311_ENABLED: 'false'
          SCRAPER_MPLS_VBR_ENABLED: 'false'
          SCRAPER_RAMSEY_SHERIFF_ENABLED: 'false'
          SCRAPER_SAINT_PAUL_VACANT_ENABLED: 'false'
          SCRAPER_TAX_FORFEIT_ENABLED: 'false'
          SCRAPER_USPS_VACANCY_ENABLED: 'false'

        run: |
          python -m scripts.run_anoka_sheriff github_actions
