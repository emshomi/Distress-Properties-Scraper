name: Fillmore Legal Notices
# Manual + every 4 days, mirroring postbulletin_legal's cadence — the
# Journal is a weekly paper, and the scraper's 45-day window means each
# run re-covers the full active publication set (dedup makes re-runs
# idempotent). The Chatfield-corridor expansion's first signal source.
on:
  workflow_dispatch:
  schedule:
    # Every 4th day at 12:40 UTC — offset from the daily sheriff jobs
    # (12:00-12:20 UTC) and the monthly parcel loaders (13:30 UTC).
    - cron: '40 12 */4 * *'
jobs:
  scrape:
    name: Run Fillmore legal notices
    runs-on: ubuntu-latest
    # One WP API fetch + parse + dedup write; small.
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Fillmore legal notices scraper
        env:
          # --- Required: database ---
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # --- Required: app config (mirror Railway's values) ---
          ENVIRONMENT: production
          LOG_LEVEL: INFO
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          # --- Geocoding (parcel_resolver may call these) ---
          GEOCODING_ENABLED: 'true'
          GEOCODING_CACHE_DAYS: '30'
          NOMINATIM_USER_AGENT: ${{ secrets.NOMINATIM_USER_AGENT }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
          # --- Scheduler (only used by Railway, but config may require it) ---
          SCHEDULER_TIMEZONE: America/Chicago
          # --- Feature flags: enable ONLY this job ---
          SCRAPER_ANOKA_SHERIFF_ENABLED: 'false'
          SCRAPER_DAKOTA_SHERIFF_ENABLED: 'false'
          SCRAPER_FILLMORE_LEGAL_ENABLED: 'true'
          SCRAPER_FILLMORE_PARCELS_ENABLED: 'false'
          SCRAPER_HENNEPIN_SHERIFF_ENABLED: 'false'
          SCRAPER_HENNEPIN_PARCELS_ENABLED: 'false'
          SCRAPER_HENNEPIN_TAX_ROLL_ENABLED: 'false'
          SCRAPER_MCRO_PROBATE_ENABLED: 'false'
          SCRAPER_MPLS_311_ENABLED: 'false'
          SCRAPER_MPLS_VBR_ENABLED: 'false'
          SCRAPER_OLMSTED_PARCELS_ENABLED: 'false'
          SCRAPER_RAMSEY_SHERIFF_ENABLED: 'false'
          SCRAPER_RAMSEY_PARCELS_ENABLED: 'false'
          SCRAPER_RAMSEY_TAX_ROLL_ENABLED: 'false'
          SCRAPER_RAMSEY_TFL_ENABLED: 'false'
          SCRAPER_SAINT_PAUL_VACANT_ENABLED: 'false'
          SCRAPER_TAX_FORFEIT_ENABLED: 'false'
          SCRAPER_USPS_VACANCY_ENABLED: 'false'
        run: |
          python -m scripts.run_fillmore_legal github_actions
